<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris - Cursor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game">
    <h1 class="game__title">TETRIS</h1>

    <div class="game__layout">
      <!-- 좌측: HOLD -->
      <aside class="side side--left">
        <section class="panel hold-area" aria-label="홀드">
          <h2 class="panel__title">HOLD</h2>
          <canvas id="hold" width="120" height="90"></canvas>
        </section>

        <section class="panel controls" aria-label="조작법">
          <h2 class="panel__title">조작법</h2>
          <ul class="controls__list">
            <li><kbd>&larr;</kbd> <kbd>&rarr;</kbd> 이동</li>
            <li><kbd>&uarr;</kbd> / <kbd>X</kbd> 회전(CW)</li>
            <li><kbd>Z</kbd> / <kbd>Ctrl</kbd> 회전(CCW)</li>
            <li><kbd>&darr;</kbd> 소프트 드롭</li>
            <li><kbd>Space</kbd> 하드 드롭</li>
            <li><kbd>C</kbd> / <kbd>Shift</kbd> 홀드</li>
            <li><kbd>P</kbd> 일시정지</li>
            <li><kbd>R</kbd> 다시 시작</li>
          </ul>
        </section>
      </aside>

      <!-- 중앙: 보드 -->
      <section class="board-area" aria-label="게임 보드">
        <canvas id="board" width="300" height="600"></canvas>
        <div id="overlay" class="overlay">
          <p id="overlay-title" class="overlay__title">TETRIS</p>
          <p id="overlay-desc" class="overlay__desc">R 키를 눌러 시작</p>
        </div>
      </section>

      <!-- 우측: SCORE + NEXT -->
      <aside class="side side--right">
        <section class="panel score-area" aria-label="점수">
          <h2 class="panel__title">SCORE</h2>
          <dl class="stats">
            <div class="stats__row"><dt>점수</dt><dd id="score">0</dd></div>
            <div class="stats__row"><dt>라인</dt><dd id="lines">0</dd></div>
            <div class="stats__row"><dt>레벨</dt><dd id="level">1</dd></div>
          </dl>
        </section>

        <section class="panel next-area" aria-label="다음 조각">
          <h2 class="panel__title">NEXT</h2>
          <canvas id="next" width="120" height="320"></canvas>
        </section>
      </aside>
    </div>
  </main>

  <script type="module" src="src/main.js"></script>
</body>
</html>
