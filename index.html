<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris - Cursor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game">
    <h1 class="game__title">TETRIS</h1>

    <div class="game__layout">
      <!-- 보드 영역 -->
      <section class="board-area" aria-label="게임 보드">
        <canvas id="board" width="300" height="600"></canvas>

        <div id="overlay" class="overlay hidden">
          <p id="overlay-title" class="overlay__title">PAUSED</p>
          <p id="overlay-desc" class="overlay__desc"></p>
        </div>
      </section>

      <!-- 사이드 패널: 점수 영역 + 다음 조각 + 조작법 -->
      <aside class="side">
        <section class="panel score-area" aria-label="점수">
          <h2 class="panel__title">SCORE</h2>
          <dl class="stats">
            <div class="stats__row">
              <dt>점수</dt>
              <dd id="score">0</dd>
            </div>
            <div class="stats__row">
              <dt>라인</dt>
              <dd id="lines">0</dd>
            </div>
            <div class="stats__row">
              <dt>레벨</dt>
              <dd id="level">1</dd>
            </div>
          </dl>
        </section>

        <section class="panel next-area" aria-label="다음 조각">
          <h2 class="panel__title">NEXT</h2>
          <canvas id="next" width="120" height="120"></canvas>
        </section>

        <section class="panel controls" aria-label="조작법">
          <h2 class="panel__title">조작법</h2>
          <ul class="controls__list">
            <li><kbd>←</kbd> <kbd>→</kbd> 좌우 이동</li>
            <li><kbd>↑</kbd> 회전</li>
            <li><kbd>↓</kbd> 소프트 드롭</li>
            <li><kbd>Space</kbd> 하드 드롭</li>
            <li><kbd>P</kbd> 일시정지</li>
            <li><kbd>R</kbd> 다시 시작</li>
          </ul>
        </section>
      </aside>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
